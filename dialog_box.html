<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialog Box</title>
    <link rel="stylesheet" href="output.css">
</head>

<body>
    <div class="bg-gray-500 fixed inset-0"></div>
    <div class="fixed inset-0">
        <div class="flex h-full justify-center items-center ">
            <div class="bg-white w-[512px] text-left shadow-xl rounded-2xl relative border overflow-hidden">
                <div class="p-5">
                    <div class="flex items-start">
                        <img class="w-8" src="image.png" alt="">
                        <div class="ml-4">
                            <h3 class="text-gray-900 font-semibold">Deactivate account</h3>
                            
                            <p class="text-sm text-gray-600">Are you sure you want to deactivate your accoun?
                                All ofyour data will be permanently removed. This action cannot be undo.
                            </p>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-5 flex flex-row-reverse">
                    <button class="bg-red-600 text-white ml-3 rounded-md px-3 py-2 hover:bg-red-500">Deactivate</button>
                    <button class="bg-white text-black ml-3 rounded-md px-3 py-2 hover:bg-gray-50">Deactivate</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
