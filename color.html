<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  
  <title>Width Example</title>
  <link rel="stylesheet" href="output.css">
</head>
<body>

  <!-- Pink Background Examples -->
  <div class="bg-pink-200">
    Code step by step
  </div>

  <div class="bg-pink-300 max-w-[200px]">
    Code step by step
  </div>

  <div class="bg-pink-400 min-w-[100px] w-20">
    Code step by step
  </div>

  <div class="bg-pink-600 w-100 max-w-[200px] text-white">
    Code step by step
  </div>


  <!-- Green Width Fraction Examples -->
  <div class="bg-green-200 w-full">
    Code step by step
  </div>

  <div class="bg-green-300 w-1/2">
    Code step by step
  </div>

  <div class="bg-green-400 w-1/3">
    Code step by step
  </div>

  <div class="bg-green-500 w-1/4">
    Code step by step
  </div>

  <div class="bg-green-600 w-1/5">
    Code step by step
  </div>

  <div class="bg-green-700 w-1/6 text-white">
    Code step by step
  </div>


  <!-- Yellow Width Size Examples -->
  <div class="bg-yellow-300 w-xs">
    Code step by step
  </div>

  <div class="bg-yellow-400 w-xl">
    Code step by step
  </div>

  <div class="bg-yellow-500 w-2xl ">
    Code step by step
  </div>

  <div class="bg-yellow-600 w-3xl ">
    Code step by step
  </div>

  <div class="bg-yellow-700 w-4xl">
    Code step by step
  </div>

  <div class="bg-yellow-800 w-2xl">
    Code step by step
  </div>

</body>
</html>
