<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <div class="size-10 bg-red-600 mt-10 ml-10 rounded-full
     animate-bounce">
    </div> 
    <hr>


    <div class="w-32 h-2  bg-red-600  ml-32 mt-32
     animate-spin">
    </div> 
    <hr>
    

    <img  class="w-20 m-32 rounded-full animate-spin  " 
    src="image.png" alt="round-circle"  class="border-4 border-black-500">


    <div class="size-10 bg-red-600 m-52 rounded-full
     animate-ping">
    </div> 

    <div class="size-10 bg-red-600 m-52 rounded-full
     animate-pulse">
    </div> 
</body>
</html>
